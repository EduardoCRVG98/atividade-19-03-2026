<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Paginação</title>

<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f5f5f5;
}

/* Container geral */
.bloco {
  margin-bottom: 20px;
}

/* Paginação */
.paginacao {
  list-style: none;
  display: inline-flex;
  padding: 6px;
  border: 1px solid #ddd;
  border-radius: 6px;
  background-color: #fff;
}

/* Itens */
.paginacao li {
  margin: 0;
}

/* Links */
.paginacao li a {
  display: block;
  padding: 8px 14px;
  text-decoration: none;
  color: #3b82f6;
  border-right: 1px solid #ddd;
  background-color: #fff;
  font-size: 14px;
  transition: 0.2s;
}

/* Remove última borda */
.paginacao li:last-child a {
  border-right: none;
}

/* Hover */
.paginacao li a:hover {
  background-color: #e5e5e5;
  color: #000;
}

/* Página ativa (modelo normal) */
.paginacao li.ativo a {
  background-color: #e5e5e5;
  color: #000;
  font-weight: bold;
}

/* Setas */
.paginacao li:first-child a,
.paginacao li:last-child a {
  font-weight: bold;
}
</style>

</head>
<body>

<div class="bloco">
  <h4>Normal</h4>
  <ul class="paginacao">
    <li><a href="#">&laquo;</a></li>
    <li><a href="#">1</a></li>
    <li class="ativo"><a href="#">2</a></li>
    <li><a href="#">3</a></li>
    <li><a href="#">&raquo;</a></li>
  </ul>
</div>

<div class="bloco">
  <h4>Quando passar o mouse</h4>
  <ul class="paginacao">
    <li><a href="#">&laquo;</a></li>
    <li><a href="#">1</a></li>
    <li><a href="#">2</a></li>
    <li><a href="#">3</a></li>
    <li><a href="#">&raquo;</a></li>
  </ul>
</div>

</body>
</html>
